variables:
  PREPARE_IMAGE: registry.ddbuild.io/images/benchmarking-platform-tools-ubuntu:latest
  DD_OCTO_STS_IMAGE: registry.ddbuild.io/images/dd-octo-sts-ci-base:2025.06-1

# Shared template — concrete jobs supply image, tags, and ARCH variable
.reliability_job:
  stage: reliability
  timeout: 6h
  variables:
    RUNTIME: "${RUNTIME}"
  needs:
    - get-versions
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  parallel:
    matrix:
      - CONFIG: ["profiler", "profiler+tracer"]
        VARIANT: ["jit", "memory"]
        ALLOCATOR: ["gmalloc", "jemalloc", "tcmalloc"]
  script:
    - set +e
    - echo "runtime=${RUNTIME}, config=${CONFIG}, variant=${VARIANT}, allocator=${ALLOCATOR}, arch=${ARCH}"
    - .gitlab/reliability/run.sh "$RUNTIME" "$CONFIG" "$VARIANT" "$ALLOCATOR" "$ARCH" 2>err.log 1>out.log
    - REASON=$(cat err.log | grep "FAIL:" | cut -f2 -d':') || true
    - if [ -n "${REASON}" ]; then echo "REASON_${CONFIG}_${ALLOCATOR}_${ARCH}X${VARIANT}=${REASON}" | tr '+' '_' >> build.env; exit 1; fi
  after_script:
    - |
      if [[ "$CI_JOB_STATUS" == "failed" ]]; then
        echo "REASON_${CONFIG}_${ALLOCATOR}_${ARCH}X${VARIANT}=Unknown failure, perhaps timeout" | tr '+' '_' >> build.env
      fi
  artifacts:
    name: "results-${ARCH}"
    when: always
    paths:
      - memwatch.log
      - memwatch-trend.png
      - hs_err.log
      - err.log
      - out.log
    reports:
      dotenv: build.env
    expire_in: 1 day

reliability-amd64:
  extends: .reliability_job
  tags: [ "arch:amd64" ]
  image: $BENCHMARK_IMAGE_AMD64
  variables:
    ARCH: amd64

reliability-aarch64:
  extends: .reliability_job
  tags: [ "arch:arm64" ]
  image: $BENCHMARK_IMAGE_ARM64
  variables:
    ARCH: aarch64

# Chaos variant runs antagonists under a patched dd-java-agent. Pulls the
# precomputed chaos.jar artifact from the chaos:build job (stresstest stage).
.reliability_chaos_job:
  stage: reliability
  timeout: 6h
  variables:
    RUNTIME: "${RUNTIME}"
  needs:
    - get-versions
    - job: chaos:build
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  parallel:
    matrix:
      - CONFIG: ["profiler", "profiler+tracer"]
        ALLOCATOR: ["gmalloc", "jemalloc", "tcmalloc"]
  script:
    - set +e
    - echo "runtime=${RUNTIME}, config=${CONFIG}, allocator=${ALLOCATOR}, arch=${ARCH}"
    - .gitlab/reliability/chaos_check.sh "$RUNTIME" "$CONFIG" "$ALLOCATOR" 2>err.log 1>out.log
    - REASON=$(cat err.log | grep "FAIL:" | cut -f2 -d':') || true
    - if [ -n "${REASON}" ]; then echo "REASON_${CONFIG}_${ALLOCATOR}_${ARCH}Xchaos=${REASON}" | tr '+' '_' >> build.env; exit 1; fi
  after_script:
    - |
      if [[ "$CI_JOB_STATUS" == "failed" ]]; then
        echo "REASON_${CONFIG}_${ALLOCATOR}_${ARCH}Xchaos=Unknown failure, perhaps timeout" | tr '+' '_' >> build.env
      fi
  artifacts:
    name: "chaos-results-${ARCH}"
    when: always
    paths:
      - hs_err.log
      - err.log
      - out.log
    reports:
      dotenv: build.env
    expire_in: 1 day

reliability-chaos-amd64:
  extends: .reliability_chaos_job
  tags: [ "arch:amd64" ]
  image: $BENCHMARK_IMAGE_AMD64
  variables:
    ARCH: amd64

reliability-chaos-aarch64:
  extends: .reliability_chaos_job
  tags: [ "arch:arm64" ]
  image: $BENCHMARK_IMAGE_ARM64
  variables:
    ARCH: aarch64

notify-slack:
  stage: notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_failure
    - when: never
  image: registry.ddbuild.io/slack-notifier:latest
  tags: [ "arch:amd64" ]
  needs:
    - get-versions
    - reliability-amd64
    - reliability-aarch64
    - reliability-chaos-amd64
    - reliability-chaos-aarch64
  script:
    - .gitlab/reliability/notify_channel.sh "${CURRENT_VERSION}"

publish-reliability-gh-pages:
  stage: notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_BRANCH == "main")'
      when: always
  image: registry.ddbuild.io/images/dd-octo-sts-ci-base:2025.06-1
  tags: [ "arch:arm64" ]
  id_tokens:
    DDOCTOSTS_ID_TOKEN:
      aud: dd-octo-sts
  needs:
    - job: reliability-amd64
      artifacts: true
    - job: reliability-aarch64
      artifacts: true
  timeout: 10m
  script:
    - ./.gitlab/reliability/publish-gh-pages.sh
  allow_failure: true

include:
  - local: .gitlab/common.yml
  - local: .gitlab/benchmarks/images.yml

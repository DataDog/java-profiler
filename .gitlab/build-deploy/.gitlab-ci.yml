image: alpine

variables:
  # Generated by https://gitlab.ddbuild.io/DataDog/java-profiler/-/jobs/1600939090
  BUILD_IMAGE_X64: registry.ddbuild.io/ci/async-profiler-build:v107978918-x64-base@sha256:4712b562eb75cf27c5d494081f459fdbd7578ef46a99162e1051ef7d1f79da4f
  # Generated by https://gitlab.ddbuild.io/DataDog/java-profiler/-/jobs/1600939090
  BUILD_IMAGE_ARM64: registry.ddbuild.io/ci/async-profiler-build:v107978918-arm64-base@sha256:15670752fa8e67c81c1b7fd4d93ef34c668649f117584ab29327d8d7733d64d6
  # Generated by https://gitlab.ddbuild.io/DataDog/java-profiler/-/jobs/1600939090
  BUILD_IMAGE_X64_2_17: registry.ddbuild.io/ci/async-profiler-build:v107978918-x64-2.17-base@sha256:03fb65c5c7fb2866397ceaf18ccb5a0b91bb377a9f89c94264427b62d48cfffd
  # Generated by https://gitlab.ddbuild.io/DataDog/java-profiler/-/jobs/1600939090
  BUILD_IMAGE_X64_MUSL: registry.ddbuild.io/ci/async-profiler-build:v107978918-x64-musl-base@sha256:0efe0c5fbd04e5647a53235d4c4942a2dd305b3d76bf5afdc052d64a7c0b9505
  # Generated by https://gitlab.ddbuild.io/DataDog/java-profiler/-/jobs/1600939090
  BUILD_IMAGE_ARM64_MUSL: registry.ddbuild.io/ci/async-profiler-build:v107978918-arm64-musl-base@sha256:1c8a96ded178bfa130077166db049cbea422c94c96a8c5172d66f8c3581d57cf
  # Generated by https://gitlab.ddbuild.io/DataDog/java-profiler/-/jobs/1600939090
  DATADOG_CI_IMAGE: registry.ddbuild.io/ci/async-profiler-build:v107978918-datadog-ci@sha256:1353737e433ef58b37ae34daf6edc0d6a5fc4706bac76ac97729e981869ea680

  LAST_COMMIT_FILE: .last.commit
  CACHE_FALLBACK_KEY: async-profiler
  FORCE_BUILD: $FORCE_BUILD

  REGISTRY: registry.ddbuild.io
  SONATYPE_USERNAME: robot-sonatype-apm-java

.build_job:
  extends:
    - .retry-config
    - .cache-config
  stage: build
  needs:
    - job: prepare:start
      artifacts: true
  when: on_success
  tags: [ "arch:amd64" ]
  image: ${BUILD_IMAGE}
  script:
    - .gitlab/scripts/build.sh
  artifacts:
    when: always
    paths:
      - libs/$TARGET/libjavaProfiler.so
      - libs/$TARGET/libjavaProfiler.so.debug
      - test/$TARGET/reports
      - test/$TARGET/logs
      - "**/output.txt"
      - "**/options.txt"
      - "ddprof-test/${TARGET}/reports/tests/test/**/*"
    expire_in: 1 day

.stresstest_job:
  extends:
    - .retry-config
    - .cache-config-pull
  stage: stresstest
  needs:
    - job: prepare:start
      artifacts: true
  when: on_success
  tags: [ "arch:amd64" ]
  image: ${BUILD_IMAGE}
  script:
    - .gitlab/scripts/stresstests.sh
  artifacts:
    when: always
    paths:
      - stresstest/$TARGET/logs
      - stresstest/$TARGET/results
    expire_in: 2 weeks

prepare:start:
  extends: .retry-config
  stage: prepare
  rules:
    - if: '$DOWNSTREAM != null'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
      when: always
    - when: always
  interruptible: true
  tags: [ "arch:arm64" ]
  image: ${PREPARE_IMAGE}

  script:
    - .gitlab/scripts/prepare.sh

  artifacts:
    paths:
      - version.txt
    reports:
      dotenv: build.env
    expire_in: 1 day

build:x64:
  extends: .build_job
  variables:
    # default to the libc 2.17 linked version
    BUILD_IMAGE: ${BUILD_IMAGE_X64_2_17}
    TARGET: linux-x64

build:x64-musl:
  extends: .build_job
  variables:
    BUILD_IMAGE: ${BUILD_IMAGE_X64_MUSL}
    TARGET: linux-x64-musl

build:arm64:
  extends: .build_job
  tags: [ "arch:arm64" ]
  variables:
    BUILD_IMAGE: ${BUILD_IMAGE_ARM64}
    TARGET: linux-arm64

build:arm64-musl:
  extends: .build_job
  timeout: 3h
  tags: [ "arch:arm64" ]
  variables:
    BUILD_IMAGE: ${BUILD_IMAGE_ARM64_MUSL}
    TARGET: linux-arm64-musl

stresstest:x64:
  extends: .stresstest_job
  needs:
    - job: prepare:start
      artifacts: true
    - job: build:x64
      artifacts: true
  variables:
    # default to the libc 2.17 linked version
    BUILD_IMAGE: ${BUILD_IMAGE_X64_2_17}
    TARGET: linux-x64

stresstest:x64-musl:
  extends: .stresstest_job
  needs:
    - job: prepare:start
      artifacts: true
    - job: build:x64-musl
      artifacts: true
  variables:
    BUILD_IMAGE: ${BUILD_IMAGE_X64_MUSL}
    TARGET: linux-x64-musl

stresstest:arm64:
  extends: .stresstest_job
  needs:
    - job: prepare:start
      artifacts: true
    - job: build:arm64
      artifacts: true
  tags: [ "arch:arm64" ]
  variables:
    BUILD_IMAGE: ${BUILD_IMAGE_ARM64}
    TARGET: linux-arm64

stresstest:arm64-musl:
  extends: .stresstest_job
  needs:
    - job: prepare:start
      artifacts: true
    - job: build:arm64-musl
      artifacts: true
  timeout: 3h
  tags: [ "arch:arm64" ]
  variables:
    BUILD_IMAGE: ${BUILD_IMAGE_ARM64_MUSL}
    TARGET: linux-arm64-musl

# Builds the chaos reliability harness once per pipeline so the per-cell
# reliability jobs can pull it as an artifact instead of compiling inline.
# Schedule-only because reliability cells are schedule-only.
chaos:build:
  extends:
    - .retry-config
    - .cache-config-pull
  stage: stresstest
  needs:
    - job: prepare:start
      artifacts: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never
  tags: [ "arch:amd64" ]
  image: ${BUILD_IMAGE_X64_2_17}
  script:
    - ./gradlew :ddprof-stresstest:chaosJar -q
  artifacts:
    paths:
      - ddprof-stresstest/build/libs/chaos.jar
    expire_in: 1 day

build-artifact:
  extends: .cache-config-pull
  stage: deploy
  needs:
    - job: prepare:start
      artifacts: true
    - job: build:x64
      artifacts: true
    - job: build:x64-musl
      artifacts: true
    - job: build:arm64
      artifacts: true
    - job: build:arm64-musl
      artifacts: true
  when: on_success
  tags: [ "arch:amd64" ]
  image: ${BUILD_IMAGE_X64}

  script:
    - .gitlab/scripts/deploy.sh assemble

  artifacts:
    name: java-profiler.zip
    paths:
      - ddprof-lib/build/libs/ddprof-*.jar
      - ddprof-lib/build/classes/java/main/META-INF/native-libs/*
      - version.txt
    expire_in: 28 days

deploy-artifact:
  extends:
    - .cache-config-pull
    - .deploy-sa
  stage: deploy
  needs:
    - job: prepare:start
      artifacts: true
    - job: build-artifact
      artifacts: true
    - job: build:x64
      artifacts: true
    - job: build:x64-musl
      artifacts: true
    - job: build:arm64
      artifacts: true
    - job: build:arm64-musl
      artifacts: true
  when: on_success
  tags: [ "arch:amd64" ]
  image: ${BUILD_IMAGE_X64}

  script:
    - .gitlab/scripts/deploy.sh publish

  artifacts:
    name: java-profiler-published.zip
    paths:
      - version.txt
    expire_in: 7 days


upload-s3:
  extends: .deploy-sa
  stage: deploy
  needs:
    - job: prepare:start
      artifacts: true
      optional: true
    - job: build:x64
      artifacts: true
    - job: build:x64-musl
      artifacts: true
    - job: build:arm64
      artifacts: true
    - job: build:arm64-musl
      artifacts: true
  tags: [ "arch:amd64" ]
  image: ${DATADOG_CI_IMAGE}
  allow_failure: true
  interruptible: true
  script:
    - source .gitlab/config.env
    - aws --version
    - datadog-ci --version
    - |
      if [ ! -f "version.txt" ]; then
        echo "WARNING: version.txt not found. This might be a manual run without prepare:start artifacts."
        export LIB_VERSION="manual-${CI_COMMIT_SHORT_SHA:-unknown}"
      else
        export LIB_VERSION=$(cat version.txt | awk -F ':' '{print $3}')
      fi
      export S3_PREFIX_RELEASE="${S3_PREFIX}/release/${LIB_VERSION}"
      echo "Using version: ${LIB_VERSION}"
    - echo "=== Available library files ==="
    - find libs/ -name "*.so*" -type f
    - |
      for lib_file in libs/*/libjavaProfiler.so; do
        if [ -f "$lib_file" ]; then
          platform=$(basename $(dirname "$lib_file"))
          echo "Uploading library: $lib_file -> libjavaProfiler-${platform}.so"
          .gitlab/scripts/upload.sh -p "${S3_PREFIX_RELEASE}" -f "$lib_file" -n "libjavaProfiler-${platform}.so"

          debug_file="${lib_file}.debug"
          if [ -f "$debug_file" ]; then
            echo "Uploading debug file: $debug_file -> libjavaProfiler-${platform}.debug"
            .gitlab/scripts/upload.sh -p "${S3_PREFIX_RELEASE}" -f "$debug_file" -n "libjavaProfiler-${platform}.debug"
          fi
        fi
      done
    - echo "=== Uploading ELF symbols to Datadog ==="
    - set +x
    - export DATADOG_API_KEY_PROD=$(aws ssm get-parameter --region ${AWS_REGION} --name ${SSM_PREFIX}.api_key_public_symbols_prod_us1 --with-decryption --query "Parameter.Value" --out text)
    - export DATADOG_API_KEY_STAGING=$(aws ssm get-parameter --region ${AWS_REGION} --name ${SSM_PREFIX}.api_key_public_symbols_staging --with-decryption --query "Parameter.Value" --out text)
    - |
      if [ -n "${DATADOG_API_KEY_STAGING:-}" ]; then
        DATADOG_API_KEY=$DATADOG_API_KEY_STAGING DATADOG_SITE=datad0g.com DD_BETA_COMMANDS_ENABLED=1 datadog-ci elf-symbols upload --disable-git ./libs
      fi
      if [ -n "${DATADOG_API_KEY_PROD:-}" ]; then
        DATADOG_API_KEY=$DATADOG_API_KEY_PROD DATADOG_SITE=datadoghq.com DD_BETA_COMMANDS_ENABLED=1 datadog-ci elf-symbols upload --disable-git ./libs
      fi
    - set -x
  rules:
    - if: '($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline") && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: manual

notify-slack-on-success:
  extends: .deploy-sa
  stage: notify
  needs:
    - job: prepare:start
      artifacts: true
    - job: deploy-artifact
      artifacts: false
  when: on_success
  image: registry.ddbuild.io/slack-notifier:latest
  tags: ["arch:amd64"]
  script:
    - .gitlab/build-deploy/notify_channel.sh success $(cat version.txt)

notify-slack-on-failure:
  extends: .deploy-sa
  stage: notify
  needs:
    - job: prepare:start
      artifacts: true
    - job: deploy-artifact
      artifacts: true
  when: on_failure
  image: registry.ddbuild.io/slack-notifier:latest
  tags: ["arch:amd64"]
  script:
    - .gitlab/build-deploy/notify_channel.sh alert $(cat version.txt)

include:
  - local: .gitlab/common.yml
  - local: .gitlab/dd-trace-integration/.gitlab-ci.yml

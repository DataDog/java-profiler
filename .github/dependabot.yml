version: 2
updates:
  # Gradle dependencies (root project)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "no-release-notes"
      - "no-review"
    ignore:
      - dependency-name: "org.junit-pioneer:junit-pioneer"
        versions: [">=2.0.0"]
    groups:
      gradle-minor:
        update-types:
          - "minor"
          - "patch"

  # Gradle dependencies (build-logic composite build)
    cooldown:
      default-days: 2
  - package-ecosystem: "gradle"
    directory: "/build-logic"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "no-release-notes"
      - "no-review"
    groups:
      gradle-minor:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
    cooldown:
      default-days: 2
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "no-release-notes"
      - "no-review"
    cooldown:
      default-days: 2

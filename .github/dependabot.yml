version: 2
updates:
  # Gradle dependencies (root project)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "no-release-notes"
      - "no-review"
    ignore:
      # JUnit 5.10+ dropped Java 8 support; 5.12+ dropped Java 11; 6.x requires Java 17.
      # CI targets on Java 8 and 11 (HotSpot and J9) run the Gradle test worker on the
      # test JDK itself (the profiler attaches to its own process), so the JUnit Platform
      # classes must be loadable by Java 8/11. Keep the entire JUnit stack at 5.9.x / 1.9.x.
      - dependency-name: "org.junit.jupiter:*"
        versions: [">=5.10.0"]
      - dependency-name: "org.junit.platform:*"
        versions: [">=1.10.0"]
      - dependency-name: "org.junit-pioneer:junit-pioneer"
        versions: [">=2.0.0"]
    groups:
      gradle-minor:
        update-types:
          - "minor"
          - "patch"

  # Gradle dependencies (build-logic composite build)
    cooldown:
      default-days: 2
  - package-ecosystem: "gradle"
    directory: "/build-logic"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "no-release-notes"
      - "no-review"
    groups:
      gradle-minor:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
    cooldown:
      default-days: 2
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "no-release-notes"
      - "no-review"
    cooldown:
      default-days: 2

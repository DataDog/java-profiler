name: Github Release
run-name: Release ${{ inputs.release_tag }} ${{ github.event.ref_name }}
on: 
  workflow_dispatch:
    inputs:
      release_tag:
        type: string
        description: "Release tag"
        required: true
  workflow_call:
    inputs:
      release_tag:
        type: string
        description: "Release tag"
        required: false
  push:
    tags:
      - v_*.*.*

permissions:
  contents: write
  actions: read

jobs:
  gh-release:
    if: (startsWith(github.event.ref, 'refs/tags/v_') || inputs.release_tag != '') && !endsWith(github.event.ref, '-SNAPSHOT')
    runs-on: ubuntu-latest
    steps:
      - name: Create Release [automatic]
        id: create_release_auto
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --draft
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --draft
          fi
      - name: Create Release [manual]
        id: create_release_manual
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --draft
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --draft
          fi

name: Dependabot Auto-Merge

on:
  schedule:
    - cron: '0 */4 * * *' # Every 4 hours
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  auto-approve-and-merge:
    name: Auto-approve and enable auto-merge
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to federate tokens
    steps:
      - uses: DataDog/dd-octo-sts-action@acaa02eee7e3bb0839e4272dacb37b8f3b58ba80 # v1.0.3
        id: octo-sts
        with:
          scope: DataDog/java-profiler
          policy: self.dependabot-automerge.pr
      - name: Auto-approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ steps.octo-sts.outputs.token }}
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

  scheduled-automerge:
    name: Merge approved Dependabot PRs
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed to federate tokens
    steps:
      - uses: DataDog/dd-octo-sts-action@acaa02eee7e3bb0839e4272dacb37b8f3b58ba80 # v1.0.3
        id: octo-sts
        with:
          scope: DataDog/java-profiler
          policy: self.dependabot-automerge.schedule
      - name: Auto-approve and enable auto-merge for Dependabot PRs
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --author "dependabot[bot]" \
            --json number \
            --jq '.[].number' \
          | while read pr_number; do
              echo "Processing PR #$pr_number"
              gh pr review "$pr_number" --approve --repo "$GITHUB_REPOSITORY" \
                || echo "Could not approve PR #$pr_number (may already be approved)"
              gh pr merge "$pr_number" --auto --squash --repo "$GITHUB_REPOSITORY" \
                || echo "Could not enable auto-merge for PR #$pr_number"
            done

# Allow java-profiler and benchmarking-platform GitLab CI to post reports
issuer: https://gitlab.ddbuild.io

subject_pattern: "project_path:(DataDog/java-profiler|DataDog/apm-reliability/benchmarking-platform):ref_type:branch:ref:.*"

permissions:
  contents: write
  issues: write
  # write (not read) is required to post comments on pull requests via the
  # issues/comments endpoint — GitLab CI back-reports benchmark & reliability
  # results to the PR (see .gitlab/scripts/upsert-github-pr-comment.sh).
  pull_requests: write
